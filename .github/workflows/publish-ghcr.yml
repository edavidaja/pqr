name: Build and Publish to GHCR

on:
  workflow_dispatch:
  pull_request:

jobs:
  get-versions:
    uses: ./.github/workflows/versions.yml

  build:
    needs: get-versions
    strategy:
      fail-fast: false
      matrix:
        platform:
          - arch: linux/amd64
            runner: ubuntu-latest
          - arch: linux/arm64
            runner: ubuntu-24.04-arm
        PYTHON_VERSION: ${{fromJson(needs.get-versions.outputs.python)}}
        QUARTO_VERSION: ${{fromJson(needs.get-versions.outputs.quarto)}}
        R_VERSION: ${{fromJson(needs.get-versions.outputs.r)}}
    runs-on: ${{ matrix.platform.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: |
            PYTHON_VERSION=${{ matrix.PYTHON_VERSION }}
            QUARTO_VERSION=${{ matrix.QUARTO_VERSION }}
            R_VERSION=${{ matrix.R_VERSION }}
          platforms: ${{ matrix.platform.arch }}
          outputs: ${{ github.event_name != 'pull_request' && format('type=image,name=ghcr.io/edavidaja/pqr,push-by-digest=true,name-canonical=true,push=true') || '' }}

      - name: Export digest
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: digests-python${{ matrix.PYTHON_VERSION }}-quarto${{ matrix.QUARTO_VERSION }}-r${{ matrix.R_VERSION }}-${{ matrix.platform.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    if: github.event_name != 'pull_request'
    needs:
      - get-versions
      - build
    strategy:
      matrix:
        PYTHON_VERSION: ${{fromJson(needs.get-versions.outputs.python)}}
        QUARTO_VERSION: ${{fromJson(needs.get-versions.outputs.quarto)}}
        R_VERSION: ${{fromJson(needs.get-versions.outputs.r)}}
    runs-on: ubuntu-latest
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-python${{ matrix.PYTHON_VERSION }}-quarto${{ matrix.QUARTO_VERSION }}-r${{ matrix.R_VERSION }}-*
          path: /tmp/digests
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create manifest list and push
        run: |
          TAG="ghcr.io/edavidaja/pqr:python${{ matrix.PYTHON_VERSION }}-quarto${{ matrix.QUARTO_VERSION }}-r${{ matrix.R_VERSION }}"
          docker buildx imagetools create -t "$TAG" \
            $(printf 'ghcr.io/edavidaja/pqr@sha256:%s ' $(ls /tmp/digests/))
